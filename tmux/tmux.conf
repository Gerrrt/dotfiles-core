# =========================================================
# Colours & Terminal
# =========================================================
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"
set -ga terminal-overrides ",*:Tc"

# Transparent backgrounds
set -g status-style bg=default
set-option -g pane-active-border-style fg=default,bg=default
set-option -g pane-border-style        fg=default,bg=default
set-window-option -g window-status-current-style bg=default
set-window-option -g window-status-style         bg=default

set-option -g set-titles on
set-option -g set-titles-string "#T"

# =========================================================
# Prefix
# =========================================================
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# =========================================================
# Vim-style pane navigation
# =========================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind L send-keys '^L'

# =========================================================
# Windows & panes
# =========================================================
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-H     previous-window
bind -n M-L     next-window

bind c new-window   -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 Config reloaded"

# =========================================================
# Mouse & scrollback
# =========================================================
set -g mouse on
set -g history-limit 50000

# =========================================================
# Vi copy mode
# =========================================================
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle   # fixed: was rectable-toggle

# copy to system clipboard via Core's cross-OS `clip` (works on WSL/macOS/Wayland/X11)
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "clip"

unbind -T copy-mode-vi MouseDragEnd1Pane

# =========================================================
# Status line
# =========================================================
set-option -g status-position top

# =========================================================
# Neovim checkhealth recommendations
# =========================================================
set-option -sg escape-time 10
set-option -g  focus-events on

# =========================================================
# Plugins
# =========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# =========================================================
# tmux-resurrect + tmux-continuum
# =========================================================
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# =========================================================
# Tokyo Night theme (macOS — storm + battery)
# =========================================================
set -g @tokyo-night-tmux_theme             moon
set -g @tokyo-night-tmux_transparent       0
set -g @tokyo-night-tmux_show_datetime     1
set -g @tokyo-night-tmux_date_format       MDY
set -g @tokyo-night-tmux_time_format       24H
set -g @tokyo-night-tmux_show_netspeed     1
set -g @tokyo-night-tmux_netspeed_iface    "en0"
set -g @tokyo-night-tmux_netspeed_showip   1
set -g @tokyo-night-tmux_netspeed_refresh  1
set -g @tokyo-night-tmux_show_git          1
set -g @tokyo-night-tmux_show_wbg          1
set -g @tokyo-night-tmux_show_hostname     0
set -g @tokyo-night-tmux_window_id_style   fsquare
set -g @tokyo-night-tmux_pane_id_style     dsquare
set -g @tokyo-night-tmux_zoom_id_style     dsquare
set -g @tokyo-night-tmux_show_menu         0
set -g @tokyo-night-tmux_show_path         0
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name      "InternalBattery-0"
set -g @tokyo-night-tmux_battery_low_threshold 21

# =========================================================
# Pop-ups
# =========================================================
bind w display-popup -E -w 30% -h 50% "~/.config/tmux/scripts/tmux-menu.sh"

unbind t
unbind T
bind T display-popup -EE -w 80% -h 80% "~/.config/tmux/scripts/tmux-scratch.sh"

bind g display-popup -d "#{pane_current_path}" -EE -w 85% -h 85% lazygit

# prefix + f — project sessionizer
bind f display-popup -E -w 50% -h 60% "~/.config/tmux/scripts/tmux-sessionizer.sh"

# =========================================================
# TPM bootstrap
# =========================================================
run '~/.config/tmux/plugins/tpm/tpm'
